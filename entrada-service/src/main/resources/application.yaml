server:
  port: 8085

spring:
  application:
    name: entrada-service

  datasource:
    url: jdbc:h2:mem:clientedb;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration


springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    cl.duoc.fullstack: INFO
    org.springframework.web: WARN

jwt:
  secret: ClaveSuperSeguraPeroDeVerdadSuperSegura
  expiration: 86400000

eureka:
  client:
    enabled: ${EUREKA_ENABLED:true}
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

app:
  discovery:
    enabled: ${APP_DISCOVERY_ENABLED:true}

services:
  funciones:
    url: ${FUNCIONES_SERVICE_URL:http://FUNCIONES-SERVICE}
  usuario:
    url: ${USUARIO_SERVICE_URL:http://USUARIO-SERVICE}
