server:
  port: ${PORT:8088}

spring:
  application:
    name: sala-service

  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    url: ${DB_URL}
    user: ${DB_USER}
    password: ${DB_PASSWORD}
    unsupported-database-action: ignore
    table: flyway_schema_history_sala
    baseline-on-migrate: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    cl.duoc.fullstack: INFO
    org.springframework.web: WARN

jwt:
  secret: ClaveSuperSeguraPeroDeVerdadSuperSegura
  expiration: 86400000

eureka:
  client:
    enabled: ${EUREKA_ENABLED:true}
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true